<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="Form.css">
</head>
<body>
    <div class="container">
        <h2>Form Demo</h2>
        
    <form>
        <div class="row">
            <div class="mb-3 col md-6">
            <label class="form-label" for="email"> Email</label>
            <input type="text"  class="form-control" placeholder="Enter your mail" id="email">
            </div>

            <div class="mb-3 col md-6">
            <label class="form-label" for="password">Password</label>
            <input type="password" class="form-control" placeholder="Email Password" id="password">
            </div>
        </div>
            <br>
            <label class="form-label" for="address">Address</label>
            <input type="text" class="form-control" placeholder="Enter Your Address" id="address">

    </form>

    </div>

    <div class="mb-3">
        <h3>Select Demo</h3>
        <select class="form-select">
            <option selected>Choose Your City</option>
            <option value="1">Chennai</option>
            <option value="2">Mumbai</option>
            <option value="3">Delhi</option>

           

        </select>
    </div>
<!--Normal CheckBox-->
    <div class="normal mb-3">
        <input type="CheckBox" id="agree">
        <label for="agree">Agree</label>
    </div>
<!--Bootstrap CheckBox-->

        <label for="agreebs" class="form-check-label">Agree</label>
        <input type="checkbox" id="agreebs" class="form-check-input">
    </div>
     <div class="form-check">
       
        <input type="radio" id="radiobs" class="form-check-input" name="radiobs">
         <label for="radiobs" class="form-check-label">Yes</label>
    </div>
    <div class="form-check">
        <input type="radio" id="radiobs2" class="form-check-input" name="radiobs2" checked>
        <label for="radiobs2" class="form-check-label">No</label>
    </div> -->
    <div class="form-check">
     <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
     <label class="form-check-label" for="radioDefault1">
    Agree
     </label>
    </div>
    <div class="form-check">
     <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault2" checked>
    <label class="form-check-label" for="radioDefault2">
        Not ready
    </label>
    </div>
    <div class="form-check form-switch">
     <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault">
     <label class="form-check-label" for="switchCheckDefault">Default switch checkbox input</label>
    </div>
    <div class="form-check form-switch">
    <input class="form-check-input" type="checkbox" role="switch" id="switchCheckChecked" checked>
    <label class="form-check-label" for="switchCheckChecked">Checked switch checkbox input</label>
    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
