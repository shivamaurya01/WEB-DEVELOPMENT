<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback form</title>
</head>
<body>
    <form action="contact">
        <h3>Feedback Form</h3>
        <div>
            <label for="name">Name:</label>
            <input type="text" name="uname" id="name" placeholder="Enter your name: ">
        </div>
        &nbsp;
        <div>
            <label for="email">Email: </label>
            <input type="text" name="uemail" id="email" placeholder="Enter Your mail:">
            
        </div>
        &nbsp;
        <div>
            <label for="segestion">Message:</label>
            <br>
            <textarea name="message" id="segestion" placeholder="please give some sugestion" rows="4" colspan="30"></textarea>
        </div>
        <div>
            <label for="rating">Rate us our of 5:</label>
            <br>
            <input type="radio" id="rate" name="rate" value="1">
            <label for="rate">1</label>
            <br>
            <input type="radio" id="rate" name="rate" value="2">
            <label for="rate">2</label>
            <br>
            <input type="radio" id="rate" name="rate" value="3">
            <label for="rate">3</label>
            <br>
            <input type="radio" id="rate" name="rate" value="4">
            <label for="rate">4</label>
            <br>
            <input type="radio" id="rate" name="rate" value="5">
            <label for="rate">5</label>
            

        </div>
        <button>Send your message!</button>

    </form>
</body>
</html>
