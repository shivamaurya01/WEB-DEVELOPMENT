<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating form</title>
</head>
<body>
    <form>
        <div>
        <label for="name">Name:</label>
        <input type="text" id="name" name="cname" placeholder="Enter your name">
        </div>
        <br>
        <div>
            Sex:
            <input type="radio" name="sex" id="gender" value="M">
            <label for="gender">Male</label>
            <input type="radio" name="sex" id="gender" value="F">
            <label for="gender">Female</label>

        </div>
        <br>
        <div>
            Country:
            <select  name="country" id="country">
                <option>Select an option</option>
                <option value="india">India</option>
                <option value="country">US</option>
                 <option value="country">japan</option>
                  <option value="country">Bangladesh</option>
                   <option value="country">China</option>
                    <option value="country">London</option>
                     <option value="country">Pakistan</option>
                      <option value="country">Nepal</option>
                       <option value="country">Sri-Lanka</option>
            </select>
        </div>
        <br>
        <div>
            <label for="message" name="message">Message:</label>
            <textarea id="message" name="message"placeholder="Write your message here: " ></textarea>
        </div>
        <br>
        <div>
            <input type="checkbox" name="subs" id="subs">
            <label for="subs">Subscribe?</label>

        </div>
        <br>
        <button>Submit</button>
       
    </form>
    
</body>
</html>
