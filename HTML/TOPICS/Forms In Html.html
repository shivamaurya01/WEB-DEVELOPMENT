<!-- Check BOX-->
    <form action="server">
        <div>
            <h3>Choose your subject</h3>
        <input type="checkbox" name="subject"   id="math" value="math">
        <label for="math"> Math</label> 
        <input type="checkbox" name="subject"   id="English" value="eng" >
        <label for="English"> English</label>

        <label for="Biology">Biology</label> 
        

        </div> 

        <button>Submit</button>

    </form>

<!--Radio Button-->
<form action="server">
    <div>
    <input type="radio" id="apple" name="fruit" value="apple"> 
    <label for="apple">apple</label>
    <input type="radio" id="mango" name="fruit" value="mango">
    <label for="mango">mango</label>
    <input type="radio" id="banana" name="fruit" value="banana">
    <label for="banana">banana</label>
    <input type="radio" id="grapes" name="fruit" value="grapes">
    <label for="grapes">grapes</label>
    </div>
    <button>Submit</button>
</form>


<!--Dropdown-->
<form action="server">

    <div>
        Choose Your Profession
        <select name="profession" id="profession">
             <option>Select Youor Option</option>
            <option value="stu" selected> Student</option>
            <option value="dev">Developer</option>



        </select>
    </div>
    <button type="submit">submit</button>

</form>

<!-- Range Input-->
 <form server>
    <div>
        <label for="vol">Select your Volume </label>
        <input type="range" id="vol" min="0" max="100" name="vol" step="20" value="20">
    </div>
    <button>Submit</button>
</form>


<!--TExt Area-->

    <form server>
        <div>

        </div>

    </form>
